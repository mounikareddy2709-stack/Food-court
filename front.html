<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Court</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: Arial, sans-serif;

      background-image: url("https://images.pexels.com/photos/17050759/pexels-photo-17050759.jpeg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .content {
      background: rgba(255, 255, 255, 0.88); /* WHITE overlay */
      padding: 40px 60px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    }

    h1 {
      color: #b71c1c;
      font-size: 42px;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    p {
      color: #333;
      font-size: 16px;
      margin-bottom: 30px;
    }

    a {
      text-decoration: none;
      padding: 12px 30px;
      background-color: #b71c1c;
      color: white;
      border-radius: 25px;
      font-size: 14px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    a:hover {
      background-color: #8e1515;
    }
  </style>
</head>
<body>

  <div class="content">
    <h1>Food Court</h1>
    <p>Fresh food, served with care</p>
    <a href="index.html">View Menu</a>
  </div>

</body>
</html>
